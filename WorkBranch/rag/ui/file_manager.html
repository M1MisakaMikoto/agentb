<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>知识库管理台</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fira+Sans:wght@400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    :root {
      --bg: #f5f7fb;
      --panel: #ffffff;
      --line: #e6ebf2;
      --text: #1e2a3a;
      --muted: #7f8ea3;
      --blue: #3b6df6;
      --blue-soft: #eef3ff;
      --green: #10b981;
      --danger: #ef4444;
      --shadow: 0 8px 24px rgba(31, 52, 86, 0.08);
      --radius: 10px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: linear-gradient(180deg, #f7f9fc, #f4f6fa 35%, #f7f9fc);
      color: var(--text);
      font-family: "Fira Sans", sans-serif;
    }
    .page {
      min-height: 100vh;
      display: grid;
      grid-template-rows: 58px 1fr;
    }
    .top-nav {
      border-bottom: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 18px;
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 700;
      color: #334155;
    }
    .brand-badge {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      background: linear-gradient(135deg, #2f80ed, #22c55e);
      box-shadow: var(--shadow);
    }
    .nav-items {
      display: flex;
      align-items: center;
      gap: 12px;
      color: #64748b;
      font-size: 13px;
    }
    .nav-chip {
      padding: 8px 12px;
      border-radius: 8px;
      cursor: pointer;
    }
    .nav-chip.active { background: var(--blue-soft); color: var(--blue); font-weight: 600; }

    .layout {
      display: grid;
      grid-template-columns: 260px 1fr;
      gap: 14px;
      padding: 14px;
      min-height: 0;
    }
    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      min-height: 0;
    }

    .sidebar { display: grid; grid-template-rows: auto 1fr auto; }
    .panel-head {
      padding: 12px;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .panel-title { font-size: 14px; font-weight: 700; }
    .small { font-size: 12px; color: var(--muted); }
    .mono { font-family: "Fira Code", monospace; }

    .cat-list { overflow: auto; padding: 8px; display: grid; gap: 4px; align-content: start; }
    .cat-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-radius: 8px;
      padding: 8px 10px;
      cursor: pointer;
      font-size: 13px;
      color: #334155;
      transition: .18s;
    }
    .cat-item:hover { background: #f4f7ff; }
    .cat-item.active { background: var(--blue-soft); color: var(--blue); font-weight: 600; }
    .side-footer {
      border-top: 1px solid var(--line);
      padding: 10px;
      display: grid;
      gap: 8px;
    }
    .side-footer input, .search, .editor input, .editor textarea, .editor select {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fbfcff;
      padding: 8px 10px;
      font-size: 12px;
      outline: none;
    }
    .side-footer input:focus, .search:focus, .editor input:focus, .editor textarea:focus, .editor select:focus { border-color: #b9c9ff; }

    .main { display: grid; grid-template-rows: auto auto 1fr auto auto; min-height: 0; }
    .tabs {
      display: flex;
      gap: 18px;
      padding: 0 14px;
      height: 44px;
      align-items: end;
      border-bottom: 1px solid var(--line);
    }
    .tab { font-size: 14px; color: #64748b; padding: 10px 0; border-bottom: 2px solid transparent; }
    .tab.active { color: var(--blue); border-bottom-color: var(--blue); font-weight: 600; }

    .tool-row, .pager {
      padding: 10px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      border-bottom: 1px solid var(--line);
      flex-wrap: wrap;
    }
    .pager { border-top: 1px solid var(--line); border-bottom: none; }
    .btns { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    button {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: #334155;
      font-size: 12px;
      font-weight: 600;
      padding: 7px 12px;
      cursor: pointer;
      transition: .18s;
    }
    button:hover { background: #f8fbff; border-color: #d0ddff; }
    button.primary { background: var(--blue); color: #fff; border-color: var(--blue); }
    button.primary:hover { background: #2f5fe4; }
    button.danger { background: #fff1f2; border-color: #fecdd3; color: var(--danger); }
    button:disabled { opacity: .5; cursor: not-allowed; }
    .search { min-width: 240px; }

    .table-wrap { overflow: auto; min-height: 0; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th, td {
      border-bottom: 1px solid #eef2f7;
      padding: 10px;
      text-align: left;
      white-space: nowrap;
    }
    th {
      position: sticky;
      top: 0;
      background: #fafcff;
      color: #8a99ad;
      font-weight: 600;
      z-index: 1;
    }
    tr:hover td { background: #f8fbff; }
    tr.active td { background: #eef4ff; }
    .file-name {
      max-width: 500px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      display: inline-block;
      vertical-align: middle;
    }
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: var(--green);
      display: inline-block;
      margin-right: 6px;
    }

    .editor {
      border-top: 1px solid var(--line);
      padding: 10px 12px 12px;
      display: grid;
      gap: 8px;
    }
    .editor textarea { min-height: 130px; resize: vertical; line-height: 1.45; font-family: "Fira Code", monospace; }
    .editor-row {
      display: grid;
      grid-template-columns: 1fr 220px auto;
      gap: 8px;
      align-items: center;
    }
    .editor-actions {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    @media (max-width: 1080px) {
      .layout { grid-template-columns: 1fr; }
      .sidebar { max-height: 320px; }
      .file-name { max-width: 240px; }
      .editor-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useEffect, useMemo, useRef, useState } = React;
    const USER_ID_STORAGE_KEY = "x-user-id";
    const API_BASE = "/rag/api";

    function getUserIdFromStorage() {
      const raw = localStorage.getItem(USER_ID_STORAGE_KEY);
      if (raw && raw.trim()) return raw.trim();
      return "1";
    }

    async function api(url, options = {}) {
      const headers = new Headers(options.headers || {});
      if (!headers.has("X-User-ID")) {
        headers.set("X-User-ID", getUserIdFromStorage());
      }
      const res = await fetch(url, { ...options, headers });
      const data = await res.json();
      if (!res.ok) throw new Error(data.detail || "请求失败");
      return data;
    }

    function flattenTree(nodes, depth = 0, out = []) {
      for (const node of nodes || []) {
        out.push({ ...node, depth });
        if (node.children?.length) flattenTree(node.children, depth + 1, out);
      }
      return out;
    }

    function App() {
      const [categories, setCategories] = useState([]);
      const [selectedCategoryId, setSelectedCategoryId] = useState(null);
      const [docs, setDocs] = useState([]);
      const [total, setTotal] = useState(0);
      const [keyword, setKeyword] = useState("");
      const [page, setPage] = useState(1);
      const [size] = useState(15);
      const [statusText, setStatusText] = useState("就绪");

      const [selectedDoc, setSelectedDoc] = useState(null);
      const [docPath, setDocPath] = useState("");
      const [docName, setDocName] = useState("");
      const [docContent, setDocContent] = useState("");
      const [docCategories, setDocCategories] = useState([]);
      const [primaryCategoryId, setPrimaryCategoryId] = useState("");

      const [newCategoryName, setNewCategoryName] = useState("");
      const uploadRef = useRef(null);

      const totalPages = Math.max(1, Math.ceil(total / size));
      const canPrev = page > 1;
      const canNext = page < totalPages;

      const categoryOptions = useMemo(
        () => [{ id: null, name: "全部分类", depth: 0 }, ...flattenTree(categories)],
        [categories]
      );

      async function loadCategories() {
        const data = await api(`${API_BASE}/categories/tree`);
        setCategories(data.items || []);
      }

      async function loadDocs(nextPage = page, nextKeyword = keyword, nextCategoryId = selectedCategoryId) {
        const params = new URLSearchParams();
        params.set("page", String(nextPage));
        params.set("size", String(size));
        if (nextKeyword.trim()) params.set("keyword", nextKeyword.trim());
        if (nextCategoryId !== null) params.set("category_id", String(nextCategoryId));
        const data = await api(`${API_BASE}/documents?${params.toString()}`);
        setDocs(data.items || []);
        setTotal(data.total || 0);
        setPage(nextPage);
      }

      async function createCategory() {
        const name = newCategoryName.trim();
        if (!name) return;
        await api(`${API_BASE}/categories`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ name, parent_id: selectedCategoryId }),
        });
        setNewCategoryName("");
        setStatusText(`已新建分类：${name}`);
        await loadCategories();
      }

      async function onSelectDoc(doc) {
        setSelectedDoc(doc);
        setDocName(doc.display_name || doc.filename);
        setDocPath(doc.storage_key || "");
        setDocContent("");
        setDocCategories([]);
        setPrimaryCategoryId("");

        const detail = await api(`${API_BASE}/documents/${doc.id}`);
        const cats = detail.categories || [];
        setDocCategories(cats);
        const primary = cats.find(c => Number(c.is_primary) === 1);
        setPrimaryCategoryId(primary ? String(primary.id) : (cats[0] ? String(cats[0].id) : ""));

        try {
          const fileData = await api(`${API_BASE}/documents/${doc.id}/file`);
          setDocContent(fileData.content || "");
        } catch {
          setDocContent("");
        }
      }

      async function switchPrimaryCategory() {
        if (!selectedDoc || !primaryCategoryId) return;
        await api(`${API_BASE}/documents/${selectedDoc.id}/primary-category/${primaryCategoryId}`, { method: "PUT" });
        setStatusText(`主分类已切换为：${primaryCategoryId}`);
        await onSelectDoc(selectedDoc);
      }

      async function saveDoc() {
        if (!selectedDoc) return;
        await api(`${API_BASE}/documents/${selectedDoc.id}`, {
          method: "PUT",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ display_name: docName }),
        });
        if (docPath) {
          await api(`${API_BASE}/file`, {
            method: "PUT",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ path: docPath, content: docContent }),
          });
        }
        setStatusText(`已保存文档：${docName}`);
        await loadDocs(page);
      }

      async function deleteDoc(doc) {
        if (!confirm(`确认删除文档：${doc.display_name || doc.filename} ?`)) return;
        await api(`${API_BASE}/documents/${doc.id}`, { method: "DELETE" });
        setStatusText(`已删除文档：${doc.id}`);
        if (selectedDoc?.id === doc.id) {
          setSelectedDoc(null);
          setDocPath("");
          setDocName("");
          setDocContent("");
          setDocCategories([]);
          setPrimaryCategoryId("");
        }
        await loadDocs(page);
      }

      async function uploadFile(file) {
        if (!file) return;
        const fd = new FormData();
        fd.append("file", file);
        if (selectedCategoryId !== null) fd.append("category_id", String(selectedCategoryId));
        await api(`${API_BASE}/documents/upload`, { method: "POST", body: fd });
        setStatusText(`上传成功：${file.name}`);
        await loadDocs(1);
      }

      useEffect(() => {
        Promise.all([loadCategories(), loadDocs(1)]).catch((e) => setStatusText(`错误: ${e.message}`));
      }, []);

      return (
        <div className="page">
          <header className="top-nav">
            <div className="brand">
              <div className="brand-badge"></div>
              <span>渝小政智管AI · 知识库管理</span>
            </div>
            <div className="nav-items">
              <div className="nav-chip">应用设置</div>
              <div className="nav-chip active">知识管理</div>
              <div className="nav-chip">工作流管理</div>
              <div className="nav-chip">应用发布</div>
            </div>
          </header>

          <div className="layout">
            <aside className="panel sidebar">
              <div className="panel-head">
                <span className="panel-title">分类树</span>
                <span className="small">{categoryOptions.length - 1}</span>
              </div>
              <div className="cat-list">
                {categoryOptions.map((c) => (
                  <div
                    key={String(c.id) + c.name}
                    className={`cat-item ${selectedCategoryId === c.id ? "active" : ""}`}
                    onClick={async () => {
                      setSelectedCategoryId(c.id);
                      await loadDocs(1, keyword, c.id);
                    }}
                  >
                    <span style={{ paddingLeft: `${c.depth * 14}px` }}>{c.name}</span>
                    <span className="small mono">{c.id === null ? "ALL" : c.id}</span>
                  </div>
                ))}
              </div>
              <div className="side-footer">
                <input
                  value={newCategoryName}
                  onChange={(e) => setNewCategoryName(e.target.value)}
                  placeholder="新分类名称"
                />
                <button onClick={() => createCategory().catch(e => setStatusText(`错误: ${e.message}`))}>新建到当前层级</button>
              </div>
            </aside>

            <section className="panel main">
              <div className="tabs">
                <div className="tab active">文档</div>
                <div className="tab">问答</div>
                <div className="tab">数据库</div>
              </div>

              <div className="tool-row">
                <div className="btns">
                  <button className="primary" onClick={() => uploadRef.current?.click()}>导入文件（绑定当前分类）</button>
                  <input
                    ref={uploadRef}
                    type="file"
                    style={{ display: "none" }}
                    onChange={(e) => uploadFile(e.target.files?.[0]).catch(err => setStatusText(`错误: ${err.message}`))}
                  />
                  <button onClick={() => loadDocs(page).catch(e => setStatusText(`错误: ${e.message}`))}>刷新</button>
                </div>
                <div className="btns">
                  <input
                    className="search"
                    value={keyword}
                    placeholder="搜索文档名称"
                    onChange={(e) => setKeyword(e.target.value)}
                    onKeyDown={(e) => {
                      if (e.key === "Enter") loadDocs(1, keyword, selectedCategoryId).catch(err => setStatusText(`错误: ${err.message}`));
                    }}
                  />
                  <button onClick={() => loadDocs(1, keyword, selectedCategoryId).catch(e => setStatusText(`错误: ${e.message}`))}>查询</button>
                  <button onClick={() => { setKeyword(""); loadDocs(1, "", selectedCategoryId).catch(e => setStatusText(`错误: ${e.message}`)); }}>清空</button>
                </div>
              </div>

              <div className="table-wrap">
                <table>
                  <thead>
                    <tr>
                      <th>文档名称</th>
                      <th>存储键</th>
                      <th>类型</th>
                      <th>大小</th>
                      <th>状态</th>
                      <th>更新时间</th>
                      <th>操作</th>
                    </tr>
                  </thead>
                  <tbody>
                    {docs.map((d) => (
                      <tr key={d.id} className={selectedDoc?.id === d.id ? "active" : ""}>
                        <td><span className="file-name">{d.display_name || d.filename}</span></td>
                        <td className="mono small">{d.storage_key}</td>
                        <td>{d.mime_type || "-"}</td>
                        <td>{d.size_bytes ?? 0}</td>
                        <td><span className="status-dot"></span>{d.status}</td>
                        <td className="small mono">{d.updated_at || "-"}</td>
                        <td>
                          <div className="btns">
                            <button onClick={() => onSelectDoc(d).catch(e => setStatusText(`错误: ${e.message}`))}>查看</button>
                            <button className="danger" onClick={() => deleteDoc(d).catch(e => setStatusText(`错误: ${e.message}`))}>删除</button>
                          </div>
                        </td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>

              <div className="pager">
                <div className="small mono">共 {total} 条，页码 {page}/{totalPages}</div>
                <div className="btns">
                  <button disabled={!canPrev} onClick={() => loadDocs(page - 1).catch(e => setStatusText(`错误: ${e.message}`))}>上一页</button>
                  <button disabled={!canNext} onClick={() => loadDocs(page + 1).catch(e => setStatusText(`错误: ${e.message}`))}>下一页</button>
                </div>
              </div>

              <div className="editor">
                <input
                  value={docName}
                  onChange={(e) => setDocName(e.target.value)}
                  placeholder="文档显示名称"
                  className="mono"
                />
                <input value={docPath} readOnly placeholder="storage_key" className="mono" />
                <div className="editor-row">
                  <select
                    value={primaryCategoryId}
                    onChange={(e) => setPrimaryCategoryId(e.target.value)}
                    disabled={!docCategories.length}
                  >
                    <option value="">选择主分类</option>
                    {docCategories.map((c) => (
                      <option key={c.id} value={c.id}>{c.name}{Number(c.is_primary) === 1 ? "（当前）" : ""}</option>
                    ))}
                  </select>
                  <button onClick={() => switchPrimaryCategory().catch(e => setStatusText(`错误: ${e.message}`))} disabled={!selectedDoc || !primaryCategoryId}>
                    切换主分类
                  </button>
                  <div className="small mono">已挂载分类: {docCategories.length}</div>
                </div>
                <textarea
                  value={docContent}
                  onChange={(e) => setDocContent(e.target.value)}
                  placeholder="文本文件内容（非文本可能为空）"
                  className="mono"
                />
                <div className="editor-actions">
                  <div className="btns">
                    <button className="primary" onClick={() => saveDoc().catch(e => setStatusText(`错误: ${e.message}`))}>保存文档</button>
                  </div>
                  <div className="small mono">
                    分类: {selectedCategoryId === null ? "全部" : selectedCategoryId} | 总数: {total} | {statusText}
                  </div>
                </div>
              </div>
            </section>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
